<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor Blog | HunterMussel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff;
      --bg-sidebar: #f7f6f3;
      --bg-hover: #f1f1ef;
      --border: #e3e2e0;
      --text: #37352f;
      --text-muted: #6b6b6b;
      --accent: #2383e2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }
    .layout {
      display: flex;
      height: 100%;
    }
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 12px 14px;
      font-weight: 600;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
    }
    .btn-new {
      margin: 10px 12px;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      text-align: left;
    }
    .btn-new:hover { background: var(--bg-hover); }
    .article-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .article-item {
      padding: 6px 14px;
      font-size: 14px;
      cursor: pointer;
      color: var(--text);
      border-radius: 0;
      text-align: left;
      width: 100%;
      border: none;
      background: none;
    }
    .article-item:hover { background: var(--bg-hover); }
    .article-item.active { background: var(--bg-hover); font-weight: 500; }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }
    .toolbar {
      padding: 8px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .toolbar button {
      padding: 6px 12px;
      font-size: 13px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
    }
    .toolbar button:hover { background: var(--bg-hover); }
    .toolbar button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .toolbar button.primary:hover { filter: brightness(1.05); }
    .editor-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 48px 24px 80px;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }
    .editor-wrap input, .editor-wrap textarea {
      font-family: inherit;
      font-size: inherit;
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
    }
    .editor-wrap input::placeholder, .editor-wrap textarea::placeholder {
      color: #9b9a97;
    }
    .field-title { font-size: 40px; font-weight: 700; margin-bottom: 8px; }
    .field-meta { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; display: flex; gap: 16px; flex-wrap: wrap; }
    .field-meta input { font-size: 14px; }
    .field-body {
      font-size: 16px;
      line-height: 1.6;
      min-height: 300px;
      resize: none;
    }
    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 48px 24px;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      background: var(--text);
      color: var(--bg);
      border-radius: 6px;
      font-size: 14px;
      z-index: 1000;
      animation: fadeIn 0.2s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
    }
    .modal {
      background: var(--bg);
      padding: 24px;
      border-radius: 8px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .modal h3 { margin: 0 0 16px; font-size: 18px; }
    .modal input, .modal textarea {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
    }
    .modal textarea { min-height: 80px; resize: vertical; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .modal-actions button { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); cursor: pointer; font-size: 14px; }
    .modal-actions button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .loading { opacity: 0.6; pointer-events: none; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">Blog</div>
      <button type="button" class="btn-new" id="btnNew">+ Novo artigo</button>
      <div class="article-list" id="articleList"></div>
    </aside>
    <main class="main">
      <div class="toolbar">
        <button type="button" class="primary" id="btnSave">Salvar</button>
        <button type="button" id="btnAiGenerate">Gerar com IA</button>
        <button type="button" id="btnAiImprove">Melhorar texto</button>
      </div>
      <div class="editor-wrap" id="editorWrap">
        <div class="empty-state" id="emptyState">Selecione um artigo ou crie um novo.</div>
        <div id="editorForm" style="display: none;">
          <input type="text" class="field-title" id="fieldTitle" placeholder="Título">
          <div class="field-meta">
            <input type="text" id="fieldDate" placeholder="Data (YYYY-MM-DD)">
            <input type="text" id="fieldDesc" placeholder="Descrição" style="flex:1; min-width: 200px;">
          </div>
          <textarea class="field-body" id="fieldBody" placeholder="Conteúdo em Markdown..."></textarea>
        </div>
      </div>
    </main>
  </div>

  <div id="modalNew" class="modal-overlay" style="display: none;">
    <div class="modal">
      <h3>Novo artigo</h3>
      <input type="text" id="newTitle" placeholder="Título">
      <div class="modal-actions">
        <button type="button" id="modalCancel">Cancelar</button>
        <button type="button" class="primary" id="modalCreate">Criar</button>
      </div>
    </div>
  </div>

  <div id="modalAi" class="modal-overlay" style="display: none;">
    <div class="modal">
      <h3 id="modalAiTitle">Gerar com IA</h3>
      <textarea id="modalAiPrompt" placeholder="Ex: Escreva um post sobre boas práticas de DevOps em 2025"></textarea>
      <div class="modal-actions">
        <button type="button" id="modalAiCancel">Cancelar</button>
        <button type="button" class="primary" id="modalAiRun">Gerar</button>
      </div>
    </div>
  </div>

  <script>
    const API = '';
    let articles = [];
    let currentSlug = null;
    let dirty = false;

    function toast(msg) {
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    async function fetchArticles() {
      const r = await fetch(API + '/api/articles');
      articles = await r.json();
      renderList();
    }

    function renderList() {
      const list = document.getElementById('articleList');
      list.innerHTML = articles.map(a => `
        <button type="button" class="article-item ${a.slug === currentSlug ? 'active' : ''}" data-slug="${a.slug}">
          ${escapeHtml(a.title || a.slug)}
        </button>
      `).join('');
      list.querySelectorAll('.article-item').forEach(btn => {
        btn.addEventListener('click', () => selectArticle(btn.dataset.slug));
      });
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    async function selectArticle(slug) {
      if (dirty && currentSlug && !confirm('Há alterações não salvas. Descartar?')) return;
      currentSlug = slug;
      dirty = false;
      renderList();
      const r = await fetch(API + `/api/articles/${slug}`);
      if (!r.ok) { toast('Erro ao carregar'); return; }
      const data = await r.json();
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('editorForm').style.display = 'block';
      document.getElementById('fieldTitle').value = data.frontmatter?.title ?? '';
      document.getElementById('fieldDate').value = data.frontmatter?.date ?? '';
      document.getElementById('fieldDesc').value = data.frontmatter?.description ?? '';
      document.getElementById('fieldBody').value = data.body ?? '';
    }

    function showEmpty() {
      currentSlug = null;
      dirty = false;
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('editorForm').style.display = 'none';
      document.getElementById('editorForm').querySelectorAll('input, textarea').forEach(f => f.value = '');
      renderList();
    }

    async function save() {
      if (!currentSlug) return;
      const payload = {
        frontmatter: {
          title: document.getElementById('fieldTitle').value.trim() || 'Sem título',
          date: document.getElementById('fieldDate').value.trim(),
          description: document.getElementById('fieldDesc').value.trim(),
        },
        body: document.getElementById('fieldBody').value,
      };
      const r = await fetch(API + `/api/articles/${currentSlug}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!r.ok) { toast('Erro ao salvar'); return; }
      dirty = false;
      toast('Salvo.');
      fetchArticles();
    }

    document.getElementById('btnSave').addEventListener('click', save);

    document.getElementById('fieldTitle').addEventListener('input', () => dirty = true);
    document.getElementById('fieldDate').addEventListener('input', () => dirty = true);
    document.getElementById('fieldDesc').addEventListener('input', () => dirty = true);
    document.getElementById('fieldBody').addEventListener('input', () => dirty = true);

    document.getElementById('btnNew').addEventListener('click', () => {
      document.getElementById('modalNew').style.display = 'flex';
      document.getElementById('newTitle').value = '';
      document.getElementById('newTitle').focus();
    });
    document.getElementById('modalCancel').addEventListener('click', () => {
      document.getElementById('modalNew').style.display = 'none';
    });
    document.getElementById('modalCreate').addEventListener('click', async () => {
      const title = document.getElementById('newTitle').value.trim() || 'Novo artigo';
      document.getElementById('modalNew').style.display = 'none';
      const r = await fetch(API + '/api/articles', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, body: '' }),
      });
      if (!r.ok) { toast('Erro ao criar'); return; }
      const data = await r.json();
      await fetchArticles();
      selectArticle(data.slug);
      toast('Artigo criado.');
    });

    document.getElementById('btnAiGenerate').addEventListener('click', () => {
      document.getElementById('modalAiTitle').textContent = 'Gerar com IA';
      document.getElementById('modalAiPrompt').placeholder = 'Ex: Escreva um post sobre boas práticas de DevOps em 2025';
      document.getElementById('modalAiPrompt').value = '';
      document.getElementById('modalAi').style.display = 'flex';
      window._aiMode = 'generate';
    });
    document.getElementById('btnAiImprove').addEventListener('click', () => {
      document.getElementById('modalAiTitle').textContent = 'Melhorar texto';
      document.getElementById('modalAiPrompt').placeholder = 'Instrução (opcional). Ex: Deixe mais formal.';
      document.getElementById('modalAiPrompt').value = '';
      document.getElementById('modalAi').style.display = 'flex';
      window._aiMode = 'improve';
    });
    document.getElementById('modalAiCancel').addEventListener('click', () => {
      document.getElementById('modalAi').style.display = 'none';
    });
    document.getElementById('modalAiRun').addEventListener('click', async () => {
      const wrap = document.getElementById('editorWrap');
      wrap.classList.add('loading');
      try {
        if (window._aiMode === 'generate') {
          const prompt = document.getElementById('modalAiPrompt').value.trim();
          if (!prompt) { toast('Digite um prompt'); return; }
          const r = await fetch(API + '/api/ai/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt }),
          });
          const j = await r.json();
          if (j.error) { toast(j.error); return; }
          document.getElementById('fieldBody').value = (document.getElementById('fieldBody').value + '\n\n' + j.text).trim();
          dirty = true;
        } else {
          const text = document.getElementById('fieldBody').value.trim();
          if (!text) { toast('Não há texto para melhorar'); return; }
          const instruction = document.getElementById('modalAiPrompt').value.trim() || 'Melhore o texto mantendo o tom. Retorne só o texto em Markdown.';
          const r = await fetch(API + '/api/ai/improve', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text, instruction }),
          });
          const j = await r.json();
          if (j.error) { toast(j.error); return; }
          document.getElementById('fieldBody').value = j.text;
          dirty = true;
        }
        document.getElementById('modalAi').style.display = 'none';
        toast('Concluído.');
      } finally {
        wrap.classList.remove('loading');
      }
    });

    window.addEventListener('beforeunload', (e) => { if (dirty) e.preventDefault(); });

    fetchArticles();
  </script>
</body>
</html>
