<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HunterMussel Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root { --bg: #0a0a0c; --sb: #0f0f12; --h: #1a1a1f; --br: #242429; --tx: #e0e0e6; --mu: #94949e; --ac: #10b981; --ac-h: #059669; }
    * { box-sizing: border-box; outline: none; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--tx); display: flex; height: 100vh; overflow: hidden; }
    
    .sidebar { width: 300px; background: var(--sb); border-right: 1px solid var(--br); display: flex; flex-direction: column; flex-shrink: 0; transition: width 0.3s; }
    .sidebar.collapsed { width: 0; border: none; overflow: hidden; }
    .sb-head { padding: 20px; font-weight: 700; border-bottom: 1px solid var(--br); display: flex; justify-content: space-between; align-items: center; }
    .art-list { flex: 1; overflow-y: auto; padding: 10px; }
    .art-btn { display: block; width: 100%; padding: 12px; margin-bottom: 4px; text-align: left; background: none; border: none; border-radius: 6px; cursor: pointer; color: var(--tx); font-size: 13px; }
    .art-btn:hover { background: var(--h); }
    .art-btn.active { background: var(--h); border: 1px solid var(--br); font-weight: 600; }
    .btn-new { margin: 16px; padding: 12px; background: var(--ac); color: #fff; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
    
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
    .topbar { height: 60px; border-bottom: 1px solid var(--br); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
    .status { font-size: 12px; color: var(--mu); display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: 0.3s; }
    .dot.saved { background: var(--ac); }
    .dot.saving { background: #f59e0b; animation: pulse 1s infinite; }
    .dot.error { background: #ef4444; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

    .ed-container { flex: 1; overflow-y: auto; padding: 40px 20px 100px; display: flex; flex-direction: column; align-items: center; }
    .ed-w { width: 100%; max-width: 740px; }
    .in-t { font-family: 'Merriweather', serif; font-size: 42px; font-weight: 700; width: 100%; border: none; background: transparent; color: var(--tx); resize: none; overflow: hidden; margin-bottom: 8px; }
    .in-s { font-size: 20px; width: 100%; border: none; background: transparent; color: var(--mu); resize: none; overflow: hidden; margin-bottom: 24px; }
    .in-b { font-family: 'Merriweather', serif; font-size: 18px; line-height: 1.7; width: 100%; min-height: 60vh; border: none; background: transparent; color: var(--tx); resize: none; outline: none; }

    .panel { position: absolute; top: 0; right: 0; bottom: 0; width: 340px; background: var(--sb); border-left: 1px solid var(--br); transform: translateX(100%); transition: transform 0.3s; z-index: 10; display: flex; flex-direction: column; }
    .panel.open { transform: translateX(0); }
    .f-group { margin-bottom: 20px; }
    .f-label { display: block; font-size: 11px; color: var(--mu); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    .f-in { width: 100%; padding: 10px; border: 1px solid var(--br); background: var(--bg); border-radius: 6px; color: var(--tx); font-size: 13px; }
    .cover-box { width: 100%; height: 160px; background: var(--bg); border: 1px dashed var(--br); border-radius: 8px; margin-top: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; }
    .cover-box img { width: 100%; height: 100%; object-fit: cover; }
    
    .modal-ov { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal { background: var(--sb); width: 90%; max-width: 600px; border-radius: 12px; border: 1px solid var(--br); padding: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .ai-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
    .btn-ai { background: var(--h); border: 1px solid var(--br); color: var(--tx); padding: 10px; border-radius: 6px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
    .btn-ai:hover { border-color: var(--ac); background: var(--bg); }
    .btn-act { background: var(--ac); color: #fff; border: none; padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-icon { background: none; border: none; color: var(--mu); cursor: pointer; padding: 8px; border-radius: 4px; display: inline-flex; align-items: center; }
    .btn-icon:hover { color: #fff; background: var(--h); }
    
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ac); color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 13px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 200; }
    .toast.show { opacity: 1; }
    #slashMenu { position: absolute; background: var(--sb); border: 1px solid var(--br); border-radius: 8px; width: 220px; display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
    .m-item { padding: 10px 14px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 10px; color: var(--tx); }
    .m-item:hover { background: var(--h); }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sb-head">HunterMussel <button class="btn-icon" onclick="toggleSidebar()"><i data-lucide="chevrons-left" size="16"></i></button></div>
    <div class="art-list" id="artList"></div>
    <button class="btn-new" onclick="createNew()"><i data-lucide="plus"></i> New Article</button>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="status">
        <button class="btn-icon" id="openSb" style="display:none;" onclick="toggleSidebar()"><i data-lucide="menu" size="18"></i></button>
        <div class="dot" id="dot"></div> <span id="stTxt">Ready</span>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn-icon" onclick="openConf()"><i data-lucide="brain"></i></button>
        <button class="btn-icon" onclick="togglePanel()"><i data-lucide="settings"></i></button>
        <button class="btn-icon" onclick="openAi()"><i data-lucide="sparkles"></i></button>
        <button class="btn-act" onclick="manualSave()">Save</button>
      </div>
    </div>
    <div class="ed-container">
      <div class="ed-w">
        <textarea id="edT" class="in-t" rows="1" placeholder="Post Title"></textarea>
        <textarea id="edS" class="in-s" rows="1" placeholder="Subtitle or summary..."></textarea>
        <textarea id="edB" class="in-b" placeholder="Write something... Use '/' for blocks"></textarea>
      </div>
    </div>
    <div class="panel" id="panel">
      <div style="padding:20px; border-bottom:1px solid var(--br); display:flex; justify-content:space-between; align-items:center;"><strong>Settings</strong><button onclick="togglePanel()" class="btn-icon">x</button></div>
      <div style="padding:20px; overflow-y:auto; flex:1;">
        <div class="f-group"><label class="f-label">Cover Image</label><div class="cover-box" onclick="document.getElementById('cIn').click()"><span id="cHin">Click to Upload</span><img id="cImg" style="display:none;"></div><input type="file" id="cIn" style="display:none;"><input id="metaImg" class="f-in" style="margin-top:8px;" placeholder="/images/blog/..."></div>
        <div class="f-group"><label class="f-label">URL Slug</label><input id="metaSlug" class="f-in"></div>
        <div class="f-group"><label class="f-label">Date</label><input id="metaDate" type="date" class="f-in"></div>
        <div class="f-group"><label class="f-label">SEO Description</label><textarea id="metaDesc" class="f-in" style="height:80px;"></textarea></div>
        <div class="f-group"><label class="f-label">Tags</label><input id="metaTags" class="f-in" placeholder="tech, ai..."></div>
        <div class="f-group"><label class="f-label">Status</label><select id="metaStatus" class="f-in"><option value="published">Published</option><option value="draft">Draft</option></select></div>
      </div>
    </div>
  </main>

  <div class="modal-ov" id="aiMdl"><div class="modal"><h3>AI Assistant</h3><p id="selHint" style="font-size:11px;color:var(--ac);display:none;margin-bottom:8px;">Selection active!</p><textarea class="f-in" id="aiPmt" style="height:100px;" placeholder="Prompt..."></textarea><div class="ai-grid"><button class="btn-ai" onclick="runAi('improve')"><i data-lucide="zap"></i> Improve</button><button class="btn-ai" onclick="runAi('extend')"><i data-lucide="maximize-2"></i> Extend</button><button class="btn-ai" onclick="runAi('simplify')"><i data-lucide="minus-circle"></i> Simplify</button><button class="btn-ai" onclick="runAi('tone')"><i data-lucide="message-square"></i> Tone</button><button class="btn-ai" onclick="runAi('facts')"><i data-lucide="search"></i> Facts</button><button class="btn-ai" onclick="runAi('continue')"><i data-lucide="chevrons-right"></i> Continue</button></div><div style="display:flex;justify-content:flex-end;margin-top:20px;gap:8px;"><button class="btn-sec btn-act" onclick="closeAi()">Cancel</button><button class="btn-act" onclick="runAi('custom')">Run</button></div></div></div>
  <div class="modal-ov" id="cfMdl"><div class="modal"><h3>AI Config</h3><div class="f-group"><label class="f-label">Active Model</label><select id="cfMod" class="f-in"></select><label class="f-label">API Key</label><input id="cfKey" type="password" class="f-in"><button class="btn-act" style="width:100%;" onclick="saveConf()">Save & Use</button></div><div style="border-top:1px solid var(--br);padding-top:16px;"><h4>Providers</h4><div id="pvList" style="max-height:120px;overflow-y:auto;border:1px solid var(--br);border-radius:6px;margin-bottom:8px;"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;"><input id="pN" class="f-in" placeholder="Name"><input id="pM" class="f-in" placeholder="model"></div><button class="btn-sec btn-act" style="width:100%;" onclick="addProv()">Add Provider</button></div><button class="btn-sec btn-act" style="width:100%;margin-top:16px;" onclick="closeConf()">Close</button></div></div>
  <div class="toast" id="toast">Saved!</div>
  <div id="slashMenu"></div>

  <script>
    lucide.createIcons();
    const API = '/api';
    let cur = null, timer = null, manSlug = false;
    const tI = document.getElementById('edT'), sI = document.getElementById('edS'), bI = document.getElementById('edB'), slI = document.getElementById('metaSlug'), dtI = document.getElementById('metaDate'), stI = document.getElementById('metaStatus'), dsI = document.getElementById('metaDesc'), tgI = document.getElementById('metaTags'), imI = document.getElementById('metaImg');

    function setSt(s, t) { document.getElementById('dot').className = 'dot ' + s; document.getElementById('stTxt').textContent = t || s; }
    function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.className='toast show'; setTimeout(()=>t.className='toast', 2000); }
    function slugify(t) { return t.toString().toLowerCase().trim().replace(/[^\w\s-]/g, '').replace(/[-\s_]+/g, '-').replace(/^-+|-+$/g, ''); }
    function resize(e) { e.style.height = 'auto'; e.style.height = e.scrollHeight + 'px'; }

    let aiConf = { active: 'anthropic/claude-3-haiku-20240307', key: '', list: [{ n: 'Claude 3 Haiku', m: 'anthropic/claude-3-haiku-20240307' }, { n: 'Claude 3.5 Sonnet', m: 'anthropic/claude-3-5-sonnet-20240620' }, { n: 'GPT-4o', m: 'openai/gpt-4o' }] };
    function loadConf() { const s = localStorage.getItem('blog_ai_v3'); if (s) aiConf = JSON.parse(s); renderConf(); }
    function saveConf() { aiConf.active = document.getElementById('cfMod').value; aiConf.key = document.getElementById('cfKey').value; localStorage.setItem('blog_ai_v3', JSON.stringify(aiConf)); renderConf(); showToast('Config Saved!'); }
    function renderConf() {
      document.getElementById('cfKey').value = aiConf.key || '';
      document.getElementById('cfMod').innerHTML = aiConf.list.map(p => `<option value="${p.m}" ${p.m === aiConf.active ? 'selected' : ''}>${p.n}</option>`).join('');
      document.getElementById('pvList').innerHTML = aiConf.list.map((p, i) => `<div style="display:flex;justify-content:space-between;padding:6px;font-size:11px;border-bottom:1px solid var(--br);"><span>${p.n}</span><button class="btn-icon" onclick="delProv(${i})"><i data-lucide="trash-2" size="12"></i></button></div>`).join('');
      lucide.createIcons({ root: document.getElementById('pvList') });
    }
    window.addProv = () => { const n = document.getElementById('pN').value, m = document.getElementById('pM').value; if(n && m) { aiConf.list.push({n, m}); saveConf(); document.getElementById('pN').value=''; document.getElementById('pM').value=''; } };
    window.delProv = (i) => { aiConf.list.splice(i, 1); saveConf(); };

    async function loadList() {
      const r = await fetch(API + '/articles'); const d = await r.json();
      document.getElementById('artList').innerHTML = d.map(a => `<button class="art-btn ${a.slug === cur ? 'active' : ''}" onclick="openArt('${a.slug}')">${a.title}</button>`).join('');
    }
    window.openArt = async (slug) => {
      cur = slug; const r = await fetch(`${API}/articles/${encodeURIComponent(slug)}`);
      const d = await r.json(); const fm = d.frontmatter;
      tI.value = fm.title || ''; sI.value = fm.subtitle || ''; bI.value = d.body || '';
      slI.value = d.slug; dtI.value = fm.date || ''; stI.value = fm.status || 'published'; dsI.value = fm.description || ''; tgI.value = fm.tags || ''; imI.value = fm.image || '';
      if(fm.image) { document.getElementById('cImg').src = fm.image; document.getElementById('cImg').style.display='block'; document.getElementById('cHin').style.display='none'; }
      else { document.getElementById('cImg').style.display='none'; document.getElementById('cHin').style.display='block'; }
      resize(tI); resize(sI); resize(bI); setSt('saved', 'Ready'); manSlug = false; loadList();
    };

    async function save(auto = false) {
      if (!cur) return;
      setSt('saving', 'Saving...');
      const payload = {
        slug: slI.value,
        frontmatter: { title: tI.value, subtitle: sI.value, date: dtI.value, status: stI.value, description: dsI.value, tags: tgI.value, image: imI.value },
        body: bI.value
      };
      try {
        const r = await fetch(`${API}/articles/${encodeURIComponent(cur)}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        const d = await r.json();
        if (r.ok) { setSt('saved', 'Saved'); if(!auto) showToast('Saved!'); if(d.slug && d.slug !== cur) cur = d.slug; loadList(); }
        else { setSt('error', 'Error'); alert(d.error); }
      } catch (e) { setSt('error', 'Offline'); }
    }
    function trigger() { setSt('saving', 'Unsaved Changes'); if(timer) clearTimeout(timer); timer = setTimeout(() => save(true), 2000); }
    window.manualSave = () => { if(timer) clearTimeout(timer); save(false); };

    tI.oninput = () => { if(!manSlug) slI.value = slugify(tI.value); resize(tI); trigger(); };
    sI.oninput = () => { resize(sI); trigger(); };
    slI.oninput = () => { manSlug = true; trigger(); };
    dtI.onchange = trigger; stI.onchange = trigger; dsI.oninput = trigger; tgI.oninput = trigger;

    bI.oninput = () => {
      resize(bI); trigger();
      const v = bI.value, s = bI.selectionStart;
      if (v.slice(s - 1, s) === '/') {
        const b = v.slice(0, s - 1);
        if (b.length === 0 || b.endsWith('\n')) {
          const rect = bI.getBoundingClientRect();
          const sm = document.getElementById('slashMenu');
          sm.style.top = (rect.top + 50) + 'px'; sm.style.left = (rect.left + 20) + 'px'; sm.style.display = 'block';
        }
      } else { document.getElementById('slashMenu').style.display = 'none'; }
    };

    window.createNew = async () => {
      const t = prompt('Title:'); if(!t) return;
      const r = await fetch(API + '/articles', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({title: t}) });
      const d = await r.json(); if(d.slug) openArt(d.slug);
    };

    window.runAi = async (act) => {
      const sel = bI.value.substring(bI.selectionStart, bI.selectionEnd);
      setSt('saving', 'AI Thinking...');
      try {
        const r = await fetch(API + '/ai/improve', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ text: sel || bI.value, context: bI.value, instruction: act + ' ' + document.getElementById('aiPmt').value, model: aiConf.active, api_key: aiConf.key }) });
        const d = await r.json();
        if(d.text) { 
          if(sel) bI.value = bI.value.substring(0, bI.selectionStart) + d.text + bI.value.substring(bI.selectionEnd);
          else if(act === 'continue') bI.value += "\n\n" + d.text;
          else bI.value = d.text;
          resize(bI); trigger(); closeAi(); 
        }
      } catch (e) { alert('AI Error'); setSt('error'); }
    };

    window.openAi = () => { const sel = bI.value.substring(bI.selectionStart, bI.selectionEnd); document.getElementById('selHint').style.display = sel ? 'block' : 'none'; document.getElementById('aiMdl').style.display='flex'; };
    window.closeAi = () => { document.getElementById('aiMdl').style.display='none'; document.getElementById('aiPmt').value=''; };
    window.openConf = () => document.getElementById('cfMdl').style.display='flex';
    window.closeConf = () => document.getElementById('cfMdl').style.display='none';
    window.togglePanel = () => document.getElementById('panel').classList.toggle('open');
    window.toggleSidebar = () => { document.getElementById('sidebar').classList.toggle('collapsed'); document.getElementById('openSb').style.display = document.getElementById('sidebar').classList.contains('collapsed') ? 'block' : 'none'; };

    document.getElementById('cIn').onchange = async (e) => {
      const fd = new FormData(); fd.append('file', e.target.files[0]);
      const r = await fetch(API + '/upload', { method: 'POST', body: fd });
      const d = await r.json(); if (d.url) { imI.value = d.url; document.getElementById('cImg').src = d.url + '?t=' + Date.now(); document.getElementById('cImg').style.display='block'; document.getElementById('cHin').style.display='none'; trigger(); }
    };

    document.addEventListener('keydown', (e) => { if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); manualSave(); } });

    // Slash Menu
    const items = [
      { l: 'Heading 1', i: 'heading-1', t: '# ' }, { l: 'Heading 2', i: 'heading-2', t: '## ' }, { l: 'Heading 3', i: 'heading-3', t: '### ' },
      { l: 'Bullet List', i: 'list', t: '- ' }, { l: 'Numbered List', i: 'list-ordered', t: '1. ' },
      { l: 'Quote', i: 'quote', t: '> ' }, { l: 'Code Block', i: 'code', t: '```\n\n```', o: -4 },
      { l: 'Callout', i: 'alert-circle', t: '> [!IMPORTANT]\n> ' },
      { l: 'YouTube', i: 'video', t: '[![] (https://img.youtube.com/vi/ID/0.jpg)](https://www.youtube.com/watch?v=ID)' },
      { l: 'Table', i: 'table', t: '| Col | Col |\n| --- | --- |\n| Val | Val |' },
      { l: 'Link', i: 'link', t: '[Text](url)' }, { l: 'Separator', i: 'minus', t: '\n---\n' }
    ];
    document.getElementById('slashMenu').innerHTML = items.map((it, i) => `<div class="m-item" onclick="insertBlock(${i})"><i data-lucide="${it.i}" size="14"></i> ${it.l}</div>`).join('');
    window.insertBlock = (idx) => {
      const it = items[idx], s = bI.selectionStart, v = bI.value;
      bI.value = v.substring(0, s - 1) + it.t + v.substring(bI.selectionEnd);
      bI.selectionStart = bI.selectionEnd = s - 1 + it.t.length + (it.o || 0);
      bI.focus(); resize(bI); trigger(); document.getElementById('slashMenu').style.display = 'none';
    };

    window.onload = () => { loadList(); loadConf(); lucide.createIcons(); };
  </script>
</body>
</html>
